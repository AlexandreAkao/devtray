name: test
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  pull_request:

jobs:
  discover:
    name: discover packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          pkgs=$(./scripts/test.sh --list)
          echo "packages=$pkgs" >> "$GITHUB_OUTPUT"
          # Fail loudly rather than let an empty matrix turn CI green with zero tests.
          [ "$pkgs" != "[]" ] || { echo "::error::No testable packages found"; exit 1; }

  packages:
    name: swift test (${{ matrix.package }})
    needs: discover
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - name: Test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: swift test --parallel

  app:
    name: xcodebuild test (app + smoke)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project DevTray.xcodeproj \
            -scheme DevTrayApp \
            -destination 'platform=macOS' \
            -derivedDataPath build/ \
            | xcpretty
        env:
          NSUnbufferedIO: YES

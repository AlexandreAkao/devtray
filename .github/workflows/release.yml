name: release
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: build · sign · notarize · publish
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Read version
        id: ver
        run: |
          PLIST="App/DevTrayApp/Info.plist"
          SHORT=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version $SHORT (build $BUILD) for tag ${GITHUB_REF_NAME}"
          if [ "v${SHORT}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match plist version v${SHORT}"
            exit 1
          fi

      - name: Guard against placeholder public key
        run: |
          PUBKEY=$(/usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" App/DevTrayApp/Info.plist)
          if [ -z "$PUBKEY" ]; then
            echo "::error::SUPublicEDKey is missing or blank in Info.plist."
            exit 1
          fi
          if echo "$PUBKEY" | grep -q PLACEHOLDER; then
            echo "::error::SUPublicEDKey is still the placeholder — set the real EdDSA public key before releasing."
            exit 1
          fi

      - name: Build (Release, unsigned)
        run: |
          xcodebuild \
            -project DevTray.xcodeproj \
            -scheme DevTrayApp \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Setup signing env
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db" >> "$GITHUB_ENV"
          echo "APP_PATH=build/Build/Products/Release/DevTray.app" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '" ')

      - name: Detect signing identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Developer ID Application identity not found in imported keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Detected signing identity: $IDENTITY"

      - name: Sign app with Developer ID (hardened runtime + secure timestamp)
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH"

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvv "$APP_PATH" 2>&1 | grep -E 'TeamIdentifier|Authority' || true

      - name: Decode App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8 }}
        run: |
          echo "$API_KEY_P8" | base64 --decode > /tmp/key.p8
          chmod 600 /tmp/key.p8

      - name: Zip for notarytool submission
        run: |
          ditto -c -k --keepParent "$APP_PATH" "DevTray-${{ steps.ver.outputs.short }}-notary.zip"

      - name: Notarize (wait, log on failure)
        env:
          KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          ISSUER: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          SUBMISSION_JSON=$(xcrun notarytool submit \
            "DevTray-${{ steps.ver.outputs.short }}-notary.zip" \
            --key /tmp/key.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --wait \
            --output-format json)
          echo "$SUBMISSION_JSON"
          STATUS=$(echo "$SUBMISSION_JSON" | jq -r '.status')
          SUBMISSION_ID=$(echo "$SUBMISSION_JSON" | jq -r '.id')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed: status=$STATUS, submission=$SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key /tmp/key.p8 \
              --key-id "$KEY_ID" \
              --issuer "$ISSUER"
            exit 1
          fi

      - name: Staple ticket
        run: |
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Install librsvg + create-dmg
        run: |
          brew install librsvg create-dmg

      - name: Render DMG background PNG from SVG
        run: |
          rsvg-convert -w 540 -h 380 Resources/dmg-background.svg -o dmg-background.png
          ls -la dmg-background.png

      - name: Build DMG (final shipping artifact)
        id: dmg
        run: |
          DMG="DevTray-${{ steps.ver.outputs.short }}.dmg"
          create-dmg \
            --background dmg-background.png \
            --window-size 540 380 \
            --icon-size 100 \
            --icon "DevTray.app" 130 190 \
            --app-drop-link 400 190 \
            --hide-extension "DevTray.app" \
            --volname "DevTray ${{ steps.ver.outputs.short }}" \
            --no-internet-enable \
            "$DMG" \
            "$APP_PATH"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "length=$(stat -f%z "$DMG")" >> "$GITHUB_OUTPUT"

      - name: Sign the DMG
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "${{ steps.dmg.outputs.dmg }}"
          codesign --verify --verbose=2 "${{ steps.dmg.outputs.dmg }}"

      - name: Notarize the DMG
        env:
          KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          ISSUER: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -e
          SUBMISSION_JSON=$(xcrun notarytool submit \
            "${{ steps.dmg.outputs.dmg }}" \
            --key /tmp/key.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --wait \
            --output-format json)
          echo "$SUBMISSION_JSON"
          STATUS=$(echo "$SUBMISSION_JSON" | jq -r '.status')
          SUBMISSION_ID=$(echo "$SUBMISSION_JSON" | jq -r '.id')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::DMG notarization failed: status=$STATUS, submission=$SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" --key /tmp/key.p8 --key-id "$KEY_ID" --issuer "$ISSUER"
            exit 1
          fi

      - name: Staple ticket to the DMG
        run: |
          xcrun stapler staple "${{ steps.dmg.outputs.dmg }}"
          xcrun stapler validate "${{ steps.dmg.outputs.dmg }}"
          spctl --assess --type install --verbose "${{ steps.dmg.outputs.dmg }}" || true

      - name: Download Sparkle tools
        run: |
          SPARKLE_VER="2.9.2"
          curl -fL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz"
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools

      - name: EdDSA-sign the archive
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE="$(find sparkle-tools -name sign_update -type f | head -1)"
          if [ -z "$SIGN_UPDATE" ]; then echo "::error::sign_update not found in Sparkle tools"; exit 1; fi
          KEYFILE="$(mktemp)"
          trap 'rm -f "$KEYFILE"' EXIT
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"
          OUT=$("$SIGN_UPDATE" -f "$KEYFILE" "${{ steps.dmg.outputs.dmg }}")
          echo "sign_update: $OUT"
          SIG=$(echo "$OUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$SIG" ]; then echo "::error::failed to parse edSignature"; exit 1; fi
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.dmg.outputs.dmg }}" \
            --title "${{ steps.ver.outputs.short }}" \
            --generate-notes

      - name: Update appcast on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # The zip is an untracked file in the workspace root; `git checkout main`
          # only touches tracked files, so it survives the branch switch.
          git checkout main
          URL="https://github.com/AlexandreAkao/devtray/releases/download/${GITHUB_REF_NAME}/${{ steps.dmg.outputs.dmg }}"
          ./scripts/appcast.sh \
            "${{ steps.ver.outputs.short }}" \
            "${{ steps.ver.outputs.build }}" \
            "$URL" \
            "${{ steps.sign.outputs.sig }}" \
            "${{ steps.dmg.outputs.length }}"
          git add docs/appcast.xml
          git commit -m "chore(release): appcast ${GITHUB_REF_NAME}" || { echo "no appcast change"; exit 0; }
          # Rebase-and-retry once in case main advanced (e.g. a re-run or concurrent tag).
          git push origin main || (git pull --rebase origin main && git push origin main)

      - name: Cleanup secrets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f /tmp/key.p8 "$RUNNER_TEMP/cert.p12"

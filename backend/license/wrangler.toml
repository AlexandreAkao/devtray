name = "devtray-license"
main = "src/index.ts"
compatibility_date = "2026-05-30"
compatibility_flags = ["nodejs_compat"]

# Custom domain — wrangler auto-creates DNS records on devtray.app:
routes = [{ pattern = "api.devtray.app", custom_domain = true }]

# KV namespaces — IDs filled in by author after `wrangler kv:namespace create` (see T35).
[[kv_namespaces]]
binding = "LICENSES"
id = "e42615c3ad954b15a224107f8c59b3f9"

[[kv_namespaces]]
binding = "LICENSES_TEST"
id = "86bfdc8c67654c1fb446ea5ee7ef5f9a"

[[kv_namespaces]]
binding = "EVENTS"
id = "c090c44d8d2449bfb07f1027a692e21c"

# Secrets set via `wrangler secret put <NAME>` (NOT committed):
#   LICENSE_PRIVATE_KEY          base64 of raw 32-byte Ed25519 private key
#   PADDLE_NOTIFICATION_SECRET   from Paddle dashboard (Developer Tools → Notifications → your endpoint → Secret key)
#   PADDLE_API_KEY               from Paddle dashboard (Developer Tools → Authentication → API keys); needs transactions:write + prices:read
#   PADDLE_PRICE_ID              the Paddle Price id the /buy route sells, format pri_01h…
#   RESEND_API_KEY               from Resend dashboard
#   ADMIN_TOKEN                  random 32 bytes base64
#
# Optional variable (NOT a secret — defaults to prod when unset):
#   PADDLE_API_BASE_URL          override for sandbox testing, e.g. https://sandbox-api.paddle.com

[vars]
LICENSE_ISS = "api.devtray.app"

# CF Workers Cron Trigger — invokes the `scheduled` handler in src/index.ts
# every 30 minutes for refund reconciliation.
[triggers]
crons = ["*/30 * * * *"]

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout — DevTray</title>
<link rel="canonical" href="https://devtray.app/checkout">
<meta name="robots" content="noindex">

<style>
  :root {
    --bg: #fafafa;
    --fg: #0a0a0a;
    --muted: #6b7280;
    --accent: #2563eb;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0a0a0a; --fg: #f4f4f5; --muted: #9ca3af; --accent: #60a5fa; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    padding: 2rem;
  }
  .wrap { max-width: 480px; text-align: center; }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 0.5rem; }
  p { color: var(--muted); line-height: 1.5; margin: 0.4rem 0; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 1.5rem auto;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fallback { display: none; margin-top: 1.5rem; }
  .fallback a {
    display: inline-block;
    padding: 0.6rem 1.2rem;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 500;
  }
  .back { font-size: 0.85rem; margin-top: 2rem; }
  .back a { color: var(--muted); }
</style>
</head>
<body>
<main class="wrap">
  <h1>Opening secure checkout…</h1>
  <p>One moment while we connect you to Paddle.</p>
  <div class="spinner" aria-hidden="true"></div>

  <div class="fallback" id="fallback">
    <p>
      Checkout didn't open automatically — your browser may be blocking
      <code>paddle.com</code> scripts (some privacy extensions do this).
    </p>
    <p><a id="fallbackLink" href="#" target="_blank" rel="noopener">Continue checkout in a new tab →</a></p>
  </div>

  <p class="back"><a href="/">← Back to devtray.app</a></p>
</main>

<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var ptxn = params.get('_ptxn');

    // No transaction id → not from a Buy click; just send them home.
    if (!ptxn) {
      window.location.replace('/');
      return;
    }

    // Build fallback link first (in case Paddle.js doesn't load at all).
    var fallbackUrl = 'https://pay.paddle.com/checkout/' + encodeURIComponent(ptxn);
    document.getElementById('fallbackLink').href = fallbackUrl;

    // If Paddle.js loaded → init + open overlay.
    if (typeof Paddle === 'undefined') {
      // CDN failed (ad-blocker, network). Show fallback after a short beat.
      setTimeout(function () {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('fallback').style.display = 'block';
      }, 1500);
      return;
    }

    Paddle.Environment.set('production');
    Paddle.Initialize({
      token: 'live_69b27cd9a76251b03da4a78cd5a',
      eventCallback: function (data) {
        if (data && data.name === 'checkout.completed') {
          window.location.href = '/thank-you';
        }
      }
    });
    Paddle.Checkout.open({ transactionId: ptxn });

    // Safety net — if overlay doesn't visibly open in 3s, surface fallback too.
    setTimeout(function () {
      if (!document.querySelector('.paddle-frame, iframe[src*="paddle"]')) {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('fallback').style.display = 'block';
      }
    }, 3000);
  })();
</script>
</body>
</html>

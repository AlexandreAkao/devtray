name: DevTray
options:
  bundleIdPrefix: com.devtray
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
packages:
  DevTrayCore:
    path: Packages/DevTrayCore
  DevTrayUI:
    path: Packages/DevTrayUI
  DevTrayStorage:
    path: Packages/DevTrayStorage
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.0.0
  JWTTool:
    path: Packages/Tools/JWTTool
  JSONTool:
    path: Packages/Tools/JSONTool
  Base64Tool:
    path: Packages/Tools/Base64Tool
  URLTool:
    path: Packages/Tools/URLTool
  HashTool:
    path: Packages/Tools/HashTool
  UUIDTool:
    path: Packages/Tools/UUIDTool
  TimestampTool:
    path: Packages/Tools/TimestampTool
  SnippetsTool:
    path: Packages/Tools/SnippetsTool
  RegexTool:
    path: Packages/Tools/RegexTool
  DiffTool:
    path: Packages/Tools/DiffTool
  ColorTool:
    path: Packages/Tools/ColorTool
  CronTool:
    path: Packages/Tools/CronTool
  YAMLTool:
    path: Packages/Tools/YAMLTool
targets:
  DevTrayApp:
    type: application
    platform: macOS
    sources:
      - path: App/DevTrayApp
    info:
      path: App/DevTrayApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: DevTray
        CFBundleShortVersionString: "0.6.0"
        CFBundleVersion: "6"
    entitlements:
      path: App/DevTrayApp/DevTrayApp.entitlements
      properties:
        com.apple.security.network.client: true
    dependencies:
      - package: DevTrayCore
      - package: DevTrayUI
      - package: DevTrayStorage
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: JWTTool
      - package: JSONTool
      - package: Base64Tool
      - package: URLTool
      - package: HashTool
      - package: UUIDTool
      - package: TimestampTool
      - package: SnippetsTool
      - package: RegexTool
      - package: DiffTool
      - package: ColorTool
      - package: CronTool
      - package: YAMLTool
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devtray.app
        ENABLE_HARDENED_RUNTIME: YES
  DevTrayAppUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/DevTrayAppUITests
    dependencies:
      - target: DevTrayApp
    settings:
      base:
        TEST_TARGET_NAME: DevTrayApp
        GENERATE_INFOPLIST_FILE: YES
